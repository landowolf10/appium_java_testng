name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Debug BrowserStack App
        run: |
          echo "APP VALUE:"
          echo "${{ secrets.BROWSERSTACK_ANDROID_APP }}"

      - name: Build with Gradle Wrapper (BrowserStack)
        run: |
          ./gradlew clean test -Plogin_test \
          -Dbrowserstack_username=${{ secrets.BROWSERSTACK_USERNAME }} \
          -Dbrowserstack_access_key=${{ secrets.BROWSERSTACK_ACCESS_KEY }} \
          -Dbrowserstack_android_app=${{ secrets.BROWSERSTACK_ANDROID_APP }}

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v3